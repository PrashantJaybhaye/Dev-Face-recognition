<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator Login - FRAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Admin Portal</h1>
                <p>Sign in to your administrator account</p>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <div style="margin-top: 24px;">
                <button class="btn btn-primary" onclick="login()">
                    Sign In
                </button>
            </div>

            <div style="margin-top: 12px;">
                <button class="btn btn-outline" onclick="window.location.href='/'">
                    <i data-lucide="home" style="width: 16px; height: 16px;"></i>
                    Return to Home
                </button>
            </div>

            <p class="alert-error" id="error-msg"></p>

            <input type="hidden" id="csrf-token" value="{{ csrf_token() if csrf_token else 'MISSING_CSRF_TOKEN' }}">
        </div>
    </div>
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (!username || !password) {
                errorMsg.textContent = 'Please enter both username and password.';
                errorMsg.style.display = 'block';
                return;
            }

            const csrfToken = document.getElementById('csrf-token') ? document.getElementById('csrf-token').value : '';
            fetch('/admin_login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ username, password })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/admin_dashboard';
                    } else {
                        errorMsg.textContent = data.message || 'Invalid credentials.';
                        errorMsg.style.display = 'block';
                    }
                })
                .catch(() => {
                    errorMsg.textContent = 'An error occurred. Please try again.';
                    errorMsg.style.display = 'block';
                });
        }

        document.getElementById('username').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
        lucide.createIcons();
    </script>
</body>

</html>
