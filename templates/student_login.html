<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - FRAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Student Portal</h1>
                <p>Face Recognition Attendance System</p>
            </div>

            <div class="form-group">
                <label for="rollNumber">Roll Number</label>
                <input type="text" inputmode="text" id="rollNumber" placeholder="Enter your roll number">
            </div>

            <div class="form-group" style="text-align: center;">
                <video id="video" autoplay playsinline
                    style="width: 100%; max-height: 240px; border-radius: 8px; border: 1px solid var(--border); transform: scaleX(-1);"></video>
                <canvas id="canvas" style="display: none;"></canvas>
            </div>
            <input type="hidden" id="csrf-token" value="{{ csrf_token() }}">

            <div style="margin-top: 24px;">
                <button id="loginBtn" class="btn btn-primary" onclick="login()">
                    Verify Identity
                </button>
            </div>

            <div style="margin-top: 12px;">
                <button class="btn btn-outline" onclick="window.location.href='/'">
                    Return to Home
                </button>
            </div>

            <p class="alert-error" id="error-msg"></p>

            <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-muted); text-align: center;">
                Contact the administrator to enroll if you are not registered yet.
            </p>
        </div>
    </div>
    <script>
        let stream = null;
        async function startCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                document.getElementById('error-msg').textContent = 'Camera API not supported in this browser.';
                document.getElementById('error-msg').style.display = 'block';
                return;
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                document.getElementById('error-msg').textContent = 'Camera required for verification.';
                document.getElementById('error-msg').style.display = 'block';
            }
        }
        startCamera();

        function login() {
            const rollNumber = document.getElementById('rollNumber').value;
            const errorMsg = document.getElementById('error-msg');
            const csrfToken = document.getElementById('csrf-token') ? document.getElementById('csrf-token').value : '';

            if (!csrfToken) {
                errorMsg.textContent = 'Security token missing. Please refresh the page.';
                errorMsg.style.display = 'block';
                return;
            }

            if (!rollNumber) {
                errorMsg.textContent = 'Please enter your roll number.';
                errorMsg.style.display = 'block';
                return;
            }

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');

            errorMsg.style.display = 'none';
            if (!video.videoWidth || video.videoWidth === 0 || !video.readyState || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
                errorMsg.textContent = 'Camera stream not ready. Please ensure your camera is allowed and turned on.';
                errorMsg.style.display = 'block';
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const imageData = canvas.toDataURL('image/jpeg');

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = 'Verifying <span style="display:inline-block; margin-left:8px; width:16px; height:16px; border:2px solid #fff; border-radius:50%; border-top-color:transparent; animation:spin 1s linear infinite;"></span>';

            fetch('/student_login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ roll_number: rollNumber, image: imageData })
            })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => {
                            throw new Error(text || 'Network response was not ok');
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        if (stream) stream.getTracks().forEach(t => t.stop());
                        btn.textContent = 'Success! Redirecting...';
                        btn.className = 'btn btn-primary';
                        btn.style.backgroundColor = '#10b981';
                        btn.style.borderColor = '#10b981';
                        setTimeout(() => window.location.href = '/student_dashboard', 500);
                    } else {
                        errorMsg.textContent = data.message || 'Invalid roll number or face mismatch.';
                        errorMsg.style.display = 'block';
                        btn.disabled = false;
                        btn.textContent = 'Verify Identity';
                    }
                })
                .catch((err) => {
                    console.error(err);
                    errorMsg.textContent = 'An error occurred or verification failed. Please try again.';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Verify Identity';
                });
        }

        document.getElementById('rollNumber').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>

</html>
