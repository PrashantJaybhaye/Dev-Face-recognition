<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FRAS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() if csrf_token else 'MISSING_CSRF_TOKEN' }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header class="header">
        <h1>Administrator Dashboard</h1>
        <div class="header-actions">
            <button class="btn btn-outline" style="padding: 8px 16px; font-size: 0.85rem;"
                onclick="window.location.href='/logout'">
                <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
                Sign Out
            </button>
        </div>
    </header>

    <main class="dashboard-container">
        <div style="margin-bottom: 24px;">
            <h2 style="font-size: 1.5rem; font-weight: 600;">System Overview</h2>
            <p style="color: var(--text-muted); margin-top: 4px;">Manage students and attendance records.</p>
        </div>

        <div class="dashboard-grid">
            <button class="dash-card success" onclick="window.location.href='/register'"
                style="width: 100%; text-align: center; font-family: inherit;">
                <div class="icon-wrapper"><i data-lucide="user-plus"></i></div>
                <h3>Register Student</h3>
                <p>Add a new student profile and face data to the system.</p>
            </button>

            <button class="dash-card primary" onclick="openModal('editModal'); listStudents();"
                style="width: 100%; text-align: center; font-family: inherit;">
                <div class="icon-wrapper"><i data-lucide="edit-3"></i></div>
                <h3>Edit Records</h3>
                <p>Add, update, or remove student profiles from the system database.</p>
            </button>

            <button class="dash-card primary" onclick="window.location.href='/attendance'"
                style="width: 100%; text-align: center; font-family: inherit;">
                <div class="icon-wrapper"><i data-lucide="video"></i></div>
                <h3>Mark Attendance</h3>
                <p>Launch the real-time face recognition attendance scanner.</p>
            </button>

            <button class="dash-card primary" onclick="openModal('checkModal'); checkAttendance();"
                style="width: 100%; text-align: center; font-family: inherit;">
                <div class="icon-wrapper"><i data-lucide="clipboard-list"></i></div>
                <h3>View Logs</h3>
                <p>Check daily attendance entry and exit logs per student.</p>
            </button>

            <button class="dash-card primary" onclick="openModal('exportModal')"
                style="width: 100%; text-align: center; font-family: inherit;">
                <div class="icon-wrapper"><i data-lucide="bar-chart-3"></i></div>
                <h3>Export Reports</h3>
                <p>Generate filtered attendance PDFs and CSV spreadsheets.</p>
            </button>

            <button class="dash-card danger" onclick="window.location.href='/'"
                style="width: 100%; text-align: center; font-family: inherit;">
                <div class="icon-wrapper"><i data-lucide="log-out"></i></div>
                <h3>Close Panel</h3>
                <p>Return to the main landing page directly.</p>
            </button>
        </div>
    </main>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Manage Students</h2>
                <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Search Bar -->
                <div
                    style="background: var(--bg-main); padding: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <input type="number" id="editRollSearch" placeholder="Jump to Roll Number"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;"
                        oninput="filterStudents()">
                </div>

                <!-- Student List Area -->
                <div id="studentListArea" style="margin-bottom: 20px;"></div>

                <!-- Form Area (Hidden by default) -->
                <div id="editFormArea" style="display: none; border-top: 2px solid var(--border); padding-top: 20px;">
                    <h3 style="font-size: 1rem; margin-bottom: 15px; color: var(--primary);">Update Student Profile</h3>
                    <div class="form-group">
                        <label>Roll Number (Locked)</label>
                        <input type="number" id="editRoll" readonly
                            style="background: var(--bg-main); cursor: not-allowed;">
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editName" placeholder="Student Name">
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" id="editDept" placeholder="Department code or name">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="editAddress" placeholder="Home Address">
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn btn-outline" style="flex: 1;" onclick="hideEditForm()">Back to List</button>
                        <button class="btn btn-success" style="flex: 2;" onclick="saveStudent()">Save Changes</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" style="width: 100%;" onclick="closeModal('editModal')">Close
                    Directory</button>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="exportModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Export Attendance Reports</h2>
                <button class="modal-close" onclick="closeModal('exportModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">
                    Select filters to customize your report. Leave fields blank to export all data.
                </p>

                <div class="form-group">
                    <label>Specific Roll Number (Optional)</label>
                    <input type="number" id="exportRoll" placeholder="e.g. 101">
                </div>



                <div class="form-group">
                    <label>Export Format</label>
                    <select id="exportFormat"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; background: var(--bg-main);">
                        <option value="pdf">Professional PDF Report</option>
                        <option value="csv">Data Spreadsheet (CSV)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap: 12px;">
                <button class="btn btn-outline" style="flex: 1;" onclick="closeModal('exportModal')">Cancel</button>
                <button class="btn btn-primary" style="flex: 2;" onclick="runExport()">Download Report</button>
            </div>
        </div>
    </div>
    <div id="checkModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Attendance Logs</h2>
                <button class="modal-close" onclick="closeModal('checkModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div
                    style="background: var(--bg-main); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="checkRoll" placeholder="Search Roll Number"
                            style="flex: 1; padding: 10px 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem;">
                        <button class="btn btn-primary" onclick="checkAttendance(false)"
                            style="width: auto; padding: 0 20px; font-size: 0.85rem;">Search</button>
                    </div>
                </div>
                <div id="attendanceResult" style="padding-right: 5px;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" style="width: 100%;" onclick="closeModal('checkModal')">Close
                    View</button>
            </div>
        </div>
    </div>

    <script>
        const getCsrfToken = () => {
            const tokenMeta = document.querySelector('meta[name="csrf-token"]');
            return tokenMeta ? tokenMeta.getAttribute('content') : '';
        };

        const escapeHtml = (str) => {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        };

        function openModal(id) { document.getElementById(id).classList.add('active'); }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            if (id === 'editModal') {
                document.getElementById('editFields').style.display = 'none';
                document.getElementById('saveButtons').style.display = 'none';
                document.getElementById('loadButtons').style.display = 'flex';
                document.getElementById('editRoll').value = '';
                if (document.getElementById('editStatus')) document.getElementById('editStatus').textContent = '';
            }
            if (id === 'checkModal') {
                document.getElementById('attendanceResult').innerHTML = '';
            }
        }

        let cachedStudents = [];

        function listStudents() {
            const listArea = document.getElementById('studentListArea');
            listArea.innerHTML = '<p class="status">Loading student directory...</p>';
            document.getElementById('editFormArea').style.display = 'none';

            fetch('/list_students')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        cachedStudents = data.students;
                        renderStudentList(data.students);
                    } else {
                        listArea.innerHTML = '<p class="status error">Failed to load directory.</p>';
                    }
                })
                .catch(() => {
                    listArea.innerHTML = '<p class="status error">Network error loading students.</p>';
                });
        }

        function renderStudentList(students) {
            const listArea = document.getElementById('studentListArea');
            if (students.length === 0) {
                listArea.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">No students registered yet.</p>';
                return;
            }

            let html = '';
            students.forEach(s => {
                html += `
                <div style="background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 15px;">
                    <div style="flex: 1;">
                        <div style="font-weight: 700; color: var(--text-main); font-size: 0.9rem;">${escapeHtml(s.name)}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">Roll: ${s.roll} • ${escapeHtml(s.dept)}</div>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button onclick="startEdit(${s.roll}, '${escapeHtml(s.name)}', '${escapeHtml(s.dept)}', '${escapeHtml(s.address)}')" 
                                style="background: rgba(37,99,235,0.1); color: var(--primary); border: none; padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; cursor: pointer;">
                            EDIT
                        </button>
                        <button onclick="deleteStudent(${s.roll})" 
                                style="background: rgba(239,68,68,0.1); color: var(--danger); border: none; padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; cursor: pointer;">
                            DEL
                        </button>
                    </div>
                </div>`;
            });
            listArea.innerHTML = html;
        }

        function filterStudents() {
            const query = document.getElementById('editRollSearch').value;
            if (!query) {
                renderStudentList(cachedStudents);
                return;
            }
            const filtered = cachedStudents.filter(s => s.roll.toString().includes(query));
            renderStudentList(filtered);
        }

        function startEdit(roll, name, dept, address) {
            document.getElementById('studentListArea').style.display = 'none';
            document.getElementById('editRollSearch').parentElement.style.display = 'none';
            document.getElementById('editFormArea').style.display = 'block';

            document.getElementById('editRoll').value = roll;
            document.getElementById('editName').value = name;
            document.getElementById('editDept').value = dept;
            document.getElementById('editAddress').value = address;
        }

        function hideEditForm() {
            document.getElementById('studentListArea').style.display = 'block';
            document.getElementById('editRollSearch').parentElement.style.display = 'block';
            document.getElementById('editFormArea').style.display = 'none';
        }

        function deleteStudent(roll) {
            if (!confirm(`Are you sure you want to PERMANENTLY delete student Roll #${roll}? This will remove all their face data and attendance logs.`)) return;

            fetch('/delete_student', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify({ roll_number: roll })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        listStudents();
                    } else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(() => alert('Network error during deletion.'));
        }

        function saveStudent() {
            const roll = document.getElementById('editRoll').value;
            const name = document.getElementById('editName').value;
            const dept = document.getElementById('editDept').value;
            const address = document.getElementById('editAddress').value;

            fetch('/edit_student', {
                method: 'POST', headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify({ roll_number: roll, name: name, department: dept, address: address })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        alert('Profile updated successfully!');
                        hideEditForm();
                        listStudents();
                    }
                    else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(() => {
                    alert('Network error saving data.');
                });
        }

        const formatDate = (dateStr) => {
            if (!dateStr || dateStr === 'Active') return dateStr;
            try {
                const date = new Date(dateStr.replace(' ', 'T'));
                if (isNaN(date.getTime())) return dateStr;
                return date.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric',
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });
            } catch (e) { return dateStr; }
        };

        function checkAttendance(viewAll = true) {
            const rollInput = document.getElementById('checkRoll');
            const roll = viewAll ? "" : rollInput.value;
            const resultDiv = document.getElementById('attendanceResult');

            if (!viewAll && !roll) {
                alert('Please enter a roll number to search.');
                return;
            }

            resultDiv.innerHTML = `<div class="status" style="display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted);">
                <span style="margin-right: 10px;">⌛</span> Loading records...
            </div>`;

            fetch('/check_attendance', {
                method: 'POST', headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify({ roll_number: roll })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        if (data.records.length === 0) {
                            resultDiv.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem;">No attendance records found for this query.</div>';
                            return;
                        }

                        let html = `
                        <div style="background: #ffffff; border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow);">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 40px; height: 40px; background: rgba(37, 99, 235, 0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.1rem;">📊</div>
                                <div>
                                    <h3 style="font-size: 1rem; font-weight: 700; color: var(--text-main); line-height: 1.2;">${escapeHtml(data.name)}</h3>
                                    <p style="color: var(--text-muted); font-size: 0.75rem; font-weight: 500;">Attendance History</p>
                                </div>
                            </div>
                            <div style="background: var(--bg-main); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);">
                                <span style="font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase;">${data.records.length} Logs</span>
                            </div>
                        </div>`;

                        data.records.forEach((r, i) => {
                            let safeLogin = formatDate(r.login);
                            let safeLogout = r.logout ? formatDate(r.logout) : 'Active';
                            let displayHeader = data.is_all ? `${escapeHtml(r.name)}` : `Session #${r.id}`;
                            let isActive = !r.logout;

                            html += `
                            <div style="display: flex; gap: 12px; margin-bottom: 2px; position: relative;">
                                <div style="display: flex; flex-direction: column; align-items: center; width: 20px;">
                                    <div style="width: 8px; height: 8px; border-radius: 50%; background: ${isActive ? 'var(--danger)' : 'var(--success)'}; z-index: 2; margin-top: 6px;"></div>
                                    <div style="width: 1px; flex: 1; background: var(--border); margin: 4px 0;"></div>
                                </div>
                                
                                <div style="flex: 1; background: #fff; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px;">
                                    <div style="flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 4px;">
                                        <div style="display: flex; align-items: center; gap: 8px;">
                                            <span style="font-weight: 700; color: var(--text-main); font-size: 0.9rem;">${displayHeader}</span>
                                            ${(data.is_all || !data.is_all) && r.roll ? `<span style="font-size: 0.65rem; color: var(--text-muted); background: var(--bg-main); padding: 1px 5px; border-radius: 4px; font-weight: 600;">Roll: ${r.roll}</span>` : ''}
                                        </div>
                                        <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 10px; color: var(--text-muted); font-size: 0.8rem;">
                                            <div style="display: flex; align-items: center; gap: 4px;">
                                                <span style="opacity: 0.6; font-size: 0.65rem; font-weight: 700;">IN</span>
                                                <span style="font-weight: 500; color: var(--secondary);">${safeLogin}</span>
                                            </div>
                                            <div style="width: 1px; height: 8px; background: var(--border);"></div>
                                            <div style="display: flex; align-items: center; gap: 4px;">
                                                <span style="opacity: 0.6; font-size: 0.65rem; font-weight: 700;">OUT</span>
                                                <span style="font-weight: 500; color: ${isActive ? 'var(--danger)' : 'var(--secondary)'};">${safeLogout}</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        ${isActive ? `
                                            <button onclick="adminManualLogout(${r.id})" style="background: rgba(239, 68, 68, 0.05); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; cursor: pointer; transition: all 0.2s;">
                                                LOGOUT
                                            </button>
                                        ` : `
                                            <div style="color: var(--success); font-weight: 700; font-size: 0.65rem; display: flex; align-items: center; gap: 4px;">
                                                DONE
                                            </div>
                                        `}
                                    </div>
                                </div>
                            </div>`;
                        });
                        resultDiv.innerHTML = html;

                        if (!viewAll) {
                            // Focus back to search for ease of use
                            rollInput.select();
                        }
                    } else {
                        resultDiv.innerHTML = `<div style="text-align: center; padding: 20px; color: var(--danger); font-size: 0.9rem;">${escapeHtml(data.message)}</div>`;
                    }
                })
                .catch(() => {
                    resultDiv.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--danger); font-size: 0.9rem;">Network error connection.</div>';
                });
        }

        function adminManualLogout(id) {
            if (!confirm('Are you sure you want to manually mark this student as logged out?')) return;

            fetch('/admin_manual_logout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCsrfToken()
                },
                body: JSON.stringify({ attendance_id: id })
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        checkAttendance();
                    } else {
                        alert('Error: ' + data.message);
                    }
                })
                .catch(() => alert('Network error performing manual logout.'));
        }

        function runExport() {
            const roll = document.getElementById('exportRoll').value;
            const format = document.getElementById('exportFormat').value;

            let url = `/export_report?format=${format}`;
            if (roll) url += `&roll_number=${roll}`;

            window.location.href = url;
            closeModal('exportModal');
        }

        // Helper func to inject a status node dynamically under an input
        function createStatusNode(targetId) {
            const p = document.createElement('p');
            p.id = 'editStatus';
            p.className = 'status';
            p.style.marginTop = '10px';
            p.style.fontWeight = '500';
            p.style.fontSize = '0.9rem';
            document.getElementById(targetId).parentNode.appendChild(p);
            return p;
        }
        lucide.createIcons();
    </script>
</body>

</html>
